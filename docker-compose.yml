
services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: blogdb

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d blogdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  fastapi:
    build: .
    container_name: fastapi_app
    restart: always

    depends_on:
      db:
        condition: service_healthy

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/blogdb
      SECRET_KEY: 8f1d7a5e2d8b1c4f9a7b6c3d2e1f0a9b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

    volumes:
      - .:/app

    command: >
      uvicorn blog.main:app
      --host 0.0.0.0
      --port 8000
      --reload

volumes:
  postgres_data: